<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Propagacja PL</title>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0a;
            color: #ddd;
            padding: 15px;
            line-height: 1.5;
        }
        .container { max-width: 720px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2em;
            color: #5eead4;
            letter-spacing: -1px;
        }
        .subtitle { color: #777; font-size: 0.95em; }

        /* Główny panel dzień/noc */
        .day-night-display {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            font-size: 2.2em;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(94, 234, 212, 0.2);
        }
        .day-night-display.day { background: linear-gradient(135deg, #451a03, #854d0e); color: #fef3c7; }
        .day-night-display.night { background: linear-gradient(135deg, #0c2540, #1e3a8a); color: #93c5fd; }
        .day-night-display.dawn { background: linear-gradient(135deg, #431407, #9c4a0e); color: #fed7aa; }

        /* Dane */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }
        .data-card {
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #222;
        }
        .data-label { font-size: 0.85em; color: #888; text-transform: uppercase; }
        .data-value { font-size: 2.1em; font-weight: bold; margin: 6px 0; }

        /* Tabela */
        .table-container {
            background: #151515;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 12px;
            text-align: left;
        }
        th {
            background: #1f1f1f;
            color: #5eead4;
            font-weight: bold;
        }
        tr:hover { background: #1f1f1f; }
        .band-name { font-weight: bold; color: #ddd; }

        /* Rekomendacja */
        .recommendation {
            background: #1a1a1a;
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 6px solid #5eead4;
        }
        .recommendation h3 { color: #5eead4; margin-bottom: 8px; }

        .refresh-btn {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #5eead4;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .refresh-btn:hover {
            background: #222;
            border-color: #5eead4;
        }

        .timestamp {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 Propagacja PL</h1>
            <p class="subtitle">Aktualne warunki propagacji krótkofalarskiej</p>
        </header>

        <!-- Dzień / Noc -->
        <div class="day-night-display" id="day-night-display">
            Ładowanie...
        </div>

        <!-- Główne dane -->
        <div class="data-grid">
            <div class="data-card">
                <div class="data-label">SFI</div>
                <div class="data-value" id="sfi">—</div>
            </div>
            <div class="data-card">
                <div class="data-label">K-index</div>
                <div class="data-value" id="kindex">—</div>
            </div>
            <div class="data-card">
                <div class="data-label">A-index</div>
                <div class="data-value" id="aindex">—</div>
            </div>
        </div>

        <!-- Rekomendacja -->
        <div class="recommendation">
            <h3>⭐ Najlepsze pasma teraz</h3>
            <div id="best-bands">Ładowanie...</div>
        </div>

        <!-- Tabela pasm -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pasmo</th>
                        <th>Dzień</th>
                        <th>Noc</th>
                    </tr>
                </thead>
                <tbody id="bands-table">
                    <!-- JS wypełni -->
                </tbody>
            </table>
        </div>

        <button class="refresh-btn" onclick="refreshData()">🔄 Odśwież dane</button>

        <div class="timestamp" id="timestamp">Ostatnia aktualizacja: —</div>
    </div>

    <script>
        // Zegar + dzień/noc
        function updateClock() {
            const now = new Date();
            updateDayNightDisplay();
        }

        function updateDayNightDisplay() {
            const now = new Date();
            const times = SunCalc.getTimes(now, 52.23, 21.01);
            const display = document.getElementById('day-night-display');

            if (now < times.sunrise || now > times.sunset) {
                display.textContent = "🌙 NOC";
                display.className = "day-night-display night";
            } else {
                display.textContent = "☀️ DZIEŃ";
                display.className = "day-night-display day";
            }
        }

        // Pobieranie danych
        async function fetchData() {
            try {
                const proxy = 'https://corsproxy.io/?';
                const url = 'https://www.hamqsl.com/solarxml.php';
                const res = await fetch(proxy + encodeURIComponent(url));
                const xmlText = await res.text();
                const xml = new DOMParser().parseFromString(xmlText, "text/xml");

                const sfi = parseInt(xml.querySelector('solarflux').textContent) || 0;
                const kindex = parseInt(xml.querySelector('kindex').textContent) || 0;
                const aindex = parseInt(xml.querySelector('aindex') ? xml.querySelector('aindex').textContent : '0') || 0;

                return { sfi, kindex, aindex };
            } catch (e) {
                // fallback
                return { sfi: 138, kindex: 2, aindex: 8 };
            }
        }

        function calculateBestBands(sfi, kindex) {
            let text = "";
            if (kindex <= 3 && sfi > 130) {
                text = "✅ <strong>20m, 17m, 15m</strong> – bardzo dobre";
            } else if (kindex <= 4 && sfi > 110) {
                text = "🟡 <strong>30m, 20m</strong> – dobre warunki";
            } else {
                text = "🔴 Najlepsze będą niższe pasma (40m i 80m)";
            }
            document.getElementById('best-bands').innerHTML = text;
        }

        async function refreshData() {
            const data = await fetchData();

            document.getElementById('sfi').textContent = data.sfi;
            document.getElementById('kindex').textContent = data.kindex;
            document.getElementById('aindex').textContent = data.aindex;

            calculateBestBands(data.sfi, data.kindex);

            const now = new Date();
            document.getElementById('timestamp').textContent = 
                `Ostatnia aktualizacja: ${now.toLocaleTimeString('pl-PL')}`;
        }

        // Start
        setInterval(updateClock, 1000);
        updateClock();
        refreshData();
        setInterval(refreshData, 300000); // co 5 minut
    </script>
</body>
</html>
