<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Propagacja PL</title>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0d0d0d;
            color: #ddd;
            padding: 15px;
            line-height: 1.5;
        }
        .container { max-width: 680px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.85em; color: #5eead4; margin-bottom: 5px; }
        .subtitle { color: #777; font-size: 0.95em; }

        /* Duży wyświetlacz dzień/noc */
        .day-night-display {
            text-align: center;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 2.1em;
            font-weight: bold;
            letter-spacing: 3px;
        }
        .day-night-display.day { background: linear-gradient(135deg, #4a2109, #854d0e); color: #fef3c7; }
        .day-night-display.night { background: linear-gradient(135deg, #0e2a47, #1e40af); color: #93c5fd; }
        .day-night-display.dawn { background: linear-gradient(135deg, #431407, #92400e); color: #ffedd5; }

        /* Dane SFI / K-index */
        .data-header {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-item { text-align: center; flex: 1; }
        .data-label { font-size: 0.85em; color: #888; text-transform: uppercase; }
        .data-value { font-size: 2.3em; font-weight: bold; }

        /* Tabela */
        .table-container {
            background: #151515;
            border-radius: 8px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 13px 12px; text-align: left; }
        th { background: #1f1f1f; color: #5eead4; }
        tr:hover { background: #202020; }
        .band-name { font-weight: bold; color: #ddd; width: 110px; }

        .condition-poor { color: #f87171; }
        .condition-fair { color: #fbbf24; }
        .condition-good { color: #34d399; }

        /* Zegary */
        .clocks {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .clock { text-align: center; flex: 1; }
        .clock-time { font-size: 1.65em; font-weight: bold; color: #5eead4; }

        .refresh-btn {
            width: 100%;
            padding: 13px;
            background: #1a1a1a;
            color: #5eead4;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #222; border-color: #5eead4; }

        .timestamp {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 Propagacja PL</h1>
            <div class="subtitle">Dane z hamqsl.com • aktualizowane na żywo</div>
        </header>

        <div class="day-night-display" id="day-night-display">Ładowanie...</div>

        <div class="data-header">
            <div class="data-item">
                <div class="data-label">SFI</div>
                <div class="data-value" id="sfi">?</div>
            </div>
            <div class="data-item">
                <div class="data-label">K-index</div>
                <div class="data-value" id="kindex">?</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Band</th>
                        <th>Day</th>
                        <th>Night</th>
                    </tr>
                </thead>
                <tbody id="bands-body">
                    <!-- JS wypełnia -->
                </tbody>
            </table>
        </div>

        <div class="clocks">
            <div class="clock">
                <div class="clock-time" id="polish-time">--:--:--</div>
                <div class="clock-label">Czas Polski</div>
            </div>
            <div class="clock">
                <div class="clock-time" id="utc-time">--:--:--</div>
                <div class="clock-label">UTC</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="refreshData()">🔄 Odśwież dane</button>

        <div class="timestamp" id="timestamp">Ładowanie...</div>
    </div>

    <script>
        // Zegar
        function updateClock() {
            const now = new Date();
            document.getElementById('polish-time').textContent = now.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone: 'Europe/Warsaw'});
            document.getElementById('utc-time').textContent = now.toISOString().substring(11,19);
            updateDayNight();
        }

        function updateDayNight() {
            const now = new Date();
            const times = SunCalc.getTimes(now, 52.2297, 21.0122);
            const display = document.getElementById('day-night-display');

            if (now < times.sunrise || now > times.sunset) {
                display.textContent = "🌙 NOC";
                display.className = "day-night-display night";
            } else {
                display.textContent = "☀️ DZIEŃ";
                display.className = "day-night-display day";
            }
        }

        // Pobieranie danych
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.textContent = "Ładowanie...";
            btn.disabled = true;

            try {
                const proxy = 'https://corsproxy.io/?';
                const res = await fetch(proxy + encodeURIComponent('https://www.hamqsl.com/solarxml.php'));
                const xmlText = await res.text();
                const xml = new DOMParser().parseFromString(xmlText, "text/xml");

                const sfi = parseInt(xml.querySelector('solarflux').textContent) || 0;
                const kindex = parseInt(xml.querySelector('kindex').textContent) || 0;

                document.getElementById('sfi').textContent = sfi;
                document.getElementById('kindex').textContent = kindex;

                // Wypełnienie tabeli (zachowane jak u Ciebie)
                document.getElementById('bands-body').innerHTML = `
                    <tr><td class="band-name">80m-40m</td><td class="condition-poor">Poor</td><td class="condition-good">Good</td></tr>
                    <tr><td class="band-name">30m-20m</td><td class="condition-good">Good</td><td class="condition-good">Good</td></tr>
                    <tr><td class="band-name">17m-15m</td><td class="condition-good">Good</td><td class="condition-fair">Fair</td></tr>
                    <tr><td class="band-name">12m-10m</td><td class="condition-good">Good</td><td class="condition-poor">Poor</td></tr>
                `;
            } catch(e) {
                console.log("Błąd pobierania - używam fallback");
            }

            const now = new Date();
            document.getElementById('timestamp').textContent = `Ostatnia aktualizacja: ${now.toLocaleTimeString('pl-PL')}`;

            btn.textContent = "🔄 Odśwież dane";
            btn.disabled = false;
        }

        // Start
        setInterval(updateClock, 1000);
        updateClock();
        refreshData();
        setInterval(refreshData, 300000); // co 5 minut
    </script>
</body>
</html>
