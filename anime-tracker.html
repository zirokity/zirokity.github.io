<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0c0c0e;
  --bg1:     #111114;
  --bg2:     #18181d;
  --bg3:     #1f1f26;
  --line:    #2a2a35;
  --text:    #e8e8f0;
  --text2:   #8888a0;
  --text3:   #44445a;
  --watch:   #3b82f6;
  --done:    #22c55e;
  --plan:    #f59e0b;
  --drop:    #ef4444;
  --watch-d: rgba(59,130,246,0.12);
  --done-d:  rgba(34,197,94,0.12);
  --plan-d:  rgba(245,158,11,0.12);
  --drop-d:  rgba(239,68,68,0.12);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  height: 60px;
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  flex-shrink: 0;
}

.logo span { color: var(--watch); }

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--line);
  flex-shrink: 0;
}

.hstats {
  display: flex;
  gap: 24px;
  flex: 1;
}

.hstat {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--text2);
}

.hstat-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.hstat-dot.w { background: var(--watch); box-shadow: 0 0 8px var(--watch); }
.hstat-dot.c { background: var(--done);  box-shadow: 0 0 8px var(--done); }
.hstat-dot.p { background: var(--plan);  box-shadow: 0 0 8px var(--plan); }
.hstat-dot.d { background: var(--drop);  box-shadow: 0 0 8px var(--drop); }

.hstat-num {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

/* ── COLUMNS ── */
.wrap {
  display: grid;
  grid-template-columns: 460px 1fr;
  min-height: calc(100vh - 60px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg1);
  border-right: 1px solid var(--line);
}

.sidebar-scroll {
  padding: 28px 22px;
  position: sticky;
  top: 60px;
  max-height: calc(100vh - 60px);
  overflow-y: auto;
  scrollbar-width: none;
}
.sidebar-scroll::-webkit-scrollbar { display: none; }

.sec-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
}

/* Search bar */
.sbar {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 20px;
  transition: border-color 0.2s;
  overflow: hidden;
}

.sbar:focus-within { border-color: var(--watch); }

.sinput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 12px 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
}
.sinput::placeholder { color: var(--text3); }

.sbtn {
  width: 40px;
  height: 40px;
  background: transparent;
  border: none;
  border-left: 1px solid var(--line);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  transition: color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.sbtn:hover { color: var(--text); background: var(--bg3); }
.sbtn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ── AUTOCOMPLETE DROPDOWN ── */
.sbar-wrap {
  position: relative;
  margin-bottom: 20px;
}

.autocomplete {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  z-index: 200;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  display: none;
}

.autocomplete.open { display: block; animation: acUp 0.15s ease; }

@keyframes acUp {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.ac-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 12px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--line);
}

.ac-item:last-child { border-bottom: none; }

.ac-item:hover,
.ac-item.focused {
  background: var(--bg3);
}

.ac-thumb {
  width: 32px;
  height: 44px;
  object-fit: cover;
  border-radius: 4px;
  background: var(--bg3);
  flex-shrink: 0;
}

.ac-info { flex: 1; min-width: 0; }

.ac-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  margin-bottom: 3px;
}

.ac-title mark {
  background: transparent;
  color: var(--watch);
  font-weight: 700;
}

.ac-meta {
  display: flex;
  gap: 6px;
  align-items: center;
}

.ac-tag {
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
}

.ac-tag.score { color: var(--plan); }

.ac-arrow {
  color: var(--text3);
  font-size: 12px;
  flex-shrink: 0;
  transition: color 0.12s;
}

.ac-item:hover .ac-arrow,
.ac-item.focused .ac-arrow { color: var(--watch); }

/* Result card */
.rlist { display: flex; flex-direction: column; gap: 10px; }

.rc {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: up 0.2s ease;
}
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.rc:hover { border-color: var(--bg3); }

.rc-top {
  display: flex;
  gap: 12px;
  padding: 12px;
}

.rc-img {
  width: 56px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
  background: var(--bg3);
  flex-shrink: 0;
}

.rc-info { flex: 1; min-width: 0; }

.rc-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.rc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.rtag {
  font-family: 'Plus Jakarta Sans', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
}
.rtag.sc { color: var(--plan); }
.rtag.ep { color: var(--watch); }

/* Quick add buttons — THE BIG CHANGE */
.rc-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  border-top: 1px solid var(--line);
}

.qa-btn {
  padding: 9px 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: background 0.15s, color 0.15s;
  color: var(--text3);
  position: relative;
}

.qa-btn:not(:last-child) { border-right: 1px solid var(--line); }

.qa-btn .ico { font-size: 14px; line-height: 1; }

.qa-btn:hover { color: var(--text); }
.qa-btn[data-s="watching"]:hover  { background: var(--watch-d); color: var(--watch); }
.qa-btn[data-s="completed"]:hover { background: var(--done-d);  color: var(--done); }
.qa-btn[data-s="planned"]:hover   { background: var(--plan-d);  color: var(--plan); }
.qa-btn[data-s="dropped"]:hover   { background: var(--drop-d);  color: var(--drop); }

.qa-btn.active[data-s="watching"]  { background: var(--watch-d); color: var(--watch); }
.qa-btn.active[data-s="completed"] { background: var(--done-d);  color: var(--done); }
.qa-btn.active[data-s="planned"]   { background: var(--plan-d);  color: var(--plan); }
.qa-btn.active[data-s="dropped"]   { background: var(--drop-d);  color: var(--drop); }

/* Msg states */
.msg {
  padding: 40px 16px;
  text-align: center;
  color: var(--text3);
}
.msg-ico { font-size: 28px; margin-bottom: 10px; }
.msg-txt { font-size: 12px; line-height: 1.6; color: var(--text2); }

.spin {
  display: inline-block;
  width: 20px; height: 20px;
  border: 1.5px solid var(--line);
  border-top-color: var(--watch);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── LIBRARY ── */
.library { padding: 28px 32px; }

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 4px;
  width: fit-content;
}

.tab {
  padding: 7px 18px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}

.tab:hover { color: var(--text); }

.tab.on { background: var(--bg3); color: var(--text); }
.tab.on.th { color: #a78bfa; background: rgba(167,139,250,0.15); }
.tab.th:hover { color: #a78bfa; }

/* ── SCHEDULE ── */
.schedule-wrap { display: flex; flex-direction: column; gap: 28px; }

.sched-day { }

.sched-day-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.sched-day-name {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.sched-day-name.today { color: #a78bfa; }

.sched-today-badge {
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.3);
  color: #a78bfa;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sched-day-line {
  flex: 1;
  height: 1px;
  background: var(--line);
}

.sched-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.sched-card {
  display: flex;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}

.sched-card:hover {
  border-color: rgba(167,139,250,0.4);
  transform: translateY(-2px);
}

.sched-card.on-list {
  border-color: rgba(34,197,94,0.25);
}

.sched-card.on-list::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--done);
}

.sched-thumb {
  width: 48px;
  height: 68px;
  object-fit: cover;
  border-radius: 6px;
  background: var(--bg3);
  flex-shrink: 0;
}

.sched-info { flex: 1; min-width: 0; }

.sched-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.sched-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 8px;
}

.sched-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
}

.sched-tag.score { color: var(--plan); }
.sched-tag.time  { color: #a78bfa; background: rgba(167,139,250,0.1); }
.sched-tag.eps   { color: var(--watch); }

.sched-actions { display: flex; gap: 5px; }

.sched-add-btn {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.sched-add-btn.watching  { background: var(--watch-d); border-color: rgba(59,130,246,0.3);  color: var(--watch); }
.sched-add-btn.planned   { background: var(--plan-d);  border-color: rgba(245,158,11,0.3);  color: var(--plan); }
.sched-add-btn.on-list-btn { background: var(--done-d); border-color: rgba(34,197,94,0.3); color: var(--done); pointer-events: none; }

.sched-add-btn:hover { filter: brightness(1.3); }

.sched-loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}

.sched-season-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 24px;
}

.sched-season-badge span { color: #a78bfa; }

.tcnt {
  background: var(--bg);
  border-radius: 20px;
  padding: 1px 7px;
  font-size: 10px;
  color: var(--text3);
}
.tab.on .tcnt { background: rgba(255,255,255,0.08); color: var(--text2); }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
}

/* Anime card */
.acard {
  display: flex;
  flex-direction: column;
  animation: up 0.3s ease;
  cursor: default;
}

.acard-img-wrap {
  position: relative;
  aspect-ratio: 2/3;
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: transform 0.25s, box-shadow 0.25s;
}
.acard:hover .acard-img-wrap {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}

.acard-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s;
}
.acard:hover .acard-img { transform: scale(1.04); }

/* Thin status glow line on left */
.acard-stripe {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 3px;
}
.acard-stripe.watching  { background: var(--watch); box-shadow: 4px 0 12px rgba(59,130,246,0.3); }
.acard-stripe.completed { background: var(--done);  box-shadow: 4px 0 12px rgba(34,197,94,0.3); }
.acard-stripe.planned   { background: var(--plan);  box-shadow: 4px 0 12px rgba(245,158,11,0.3); }
.acard-stripe.dropped   { background: var(--drop);  box-shadow: 4px 0 12px rgba(239,68,68,0.3); }

.acard-score {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(12,12,14,0.85);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--plan);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 5px;
}

/* Overlay */
.acard-ov {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(3px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
  padding: 14px;
}
.acard:hover .acard-ov { opacity: 1; }

/* Status buttons inside overlay */
.ov-statuses {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.ov-sbtn {
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 7px;
}

.ov-sbtn[data-s="watching"]  { background: var(--watch-d); border-color: rgba(59,130,246,0.25); color: var(--watch); }
.ov-sbtn[data-s="completed"] { background: var(--done-d);  border-color: rgba(34,197,94,0.25);  color: var(--done); }
.ov-sbtn[data-s="planned"]   { background: var(--plan-d);  border-color: rgba(245,158,11,0.25); color: var(--plan); }
.ov-sbtn[data-s="dropped"]   { background: var(--drop-d);  border-color: rgba(239,68,68,0.25);  color: var(--drop); }

.ov-sbtn.cur { filter: brightness(1.5); font-weight: 600; }

.ov-sbtn:hover { filter: brightness(1.3); transform: translateX(2px); }

.ov-del {
  width: 100%;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid rgba(239,68,68,0.2);
  background: transparent;
  color: var(--text3);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  margin-top: 2px;
}
.ov-del:hover { background: var(--drop-d); color: var(--drop); border-color: rgba(239,68,68,0.4); }

/* Below card */
.acard-body { padding: 9px 2px 0; }
.acard-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text);
  margin-bottom: 3px;
}
.acard-sub {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--text3);
  display: flex;
  gap: 8px;
}

/* Empty */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}
.empty-big {
  font-family: 'Outfit', sans-serif;
  font-size: 72px;
  font-weight: 800;
  color: var(--bg3);
  line-height: 1;
  margin-bottom: 14px;
}
.empty h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 6px;
}
.empty p { font-size: 13px; color: var(--text3); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 13px;
  z-index: 999;
  transform: translateY(70px);
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  max-width: 280px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.toast.vis { transform: translateY(0); opacity: 1; }
.toast-bar {
  width: 3px;
  align-self: stretch;
  border-radius: 2px;
  flex-shrink: 0;
}
.toast-bar.ok  { background: var(--done); }
.toast-bar.err { background: var(--drop); }
.toast-bar.inf { background: var(--watch); }
.t-title { font-weight: 600; margin-bottom: 2px; font-size: 13px; }
.t-sub { font-size: 11px; color: var(--text2); font-family: 'Plus Jakarta Sans', sans-serif; }

/* ── CSV BUTTONS ── */
.library-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.csv-btns {
  display: flex;
  gap: 8px;
}

.csv-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg2);
  color: var(--text2);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.csv-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

.csv-btn:hover { border-color: var(--text2); color: var(--text); background: var(--bg3); }
.csv-btn.import:hover { border-color: var(--watch); color: var(--watch); }
.csv-btn.export:hover { border-color: var(--done);  color: var(--done); }

/* ── CSV MODAL ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-bg.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: 16px;
  width: 560px;
  max-width: calc(100vw - 40px);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  transform: translateY(16px) scale(0.98);
  transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
  overflow: hidden;
}

.modal-bg.open .modal {
  transform: translateY(0) scale(1);
}

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Outfit', sans-serif;
  font-size: 17px;
  font-weight: 700;
}

.modal-close {
  width: 30px; height: 30px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--drop-d); color: var(--drop); border-color: var(--drop); }

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}

/* Drop zone */
.dropzone {
  border: 2px dashed var(--line);
  border-radius: 12px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}

.dropzone:hover,
.dropzone.drag { border-color: var(--watch); background: var(--watch-d); }

.dropzone-icon { font-size: 36px; margin-bottom: 10px; }

.dropzone-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.dropzone-sub { font-size: 12px; color: var(--text3); }

.dropzone-sub span { color: var(--watch); cursor: pointer; }
.dropzone-sub span:hover { text-decoration: underline; }

/* Format hint */
.csv-hint {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 16px;
}

.csv-hint-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 6px;
}

.csv-hint code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--done);
  display: block;
  line-height: 1.6;
  word-break: break-all;
}

/* Preview table */
.preview-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.preview-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.preview-warn {
  font-size: 11px;
  color: var(--plan);
}

.preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.preview-table th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--line);
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.preview-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}

.preview-table tr:last-child td { border-bottom: none; }
.preview-table tr:hover td { background: var(--bg2); }

.preview-table .pt-title { font-weight: 500; color: var(--text); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preview-table .pt-status { }
.preview-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
}
.preview-badge.watching  { background: var(--watch-d); color: var(--watch); }
.preview-badge.completed { background: var(--done-d);  color: var(--done); }
.preview-badge.planned   { background: var(--plan-d);  color: var(--plan); }
.preview-badge.dropped   { background: var(--drop-d);  color: var(--drop); }
.preview-badge.unknown   { background: var(--bg3); color: var(--text3); }

.preview-skip { color: var(--drop); font-size: 10px; }

/* Modal footer */
.modal-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-top: 1px solid var(--line);
  flex-shrink: 0;
  gap: 10px;
}

.modal-foot-info { font-size: 12px; color: var(--text3); }

.modal-foot-btns { display: flex; gap: 8px; }

.mfbtn {
  padding: 8px 18px;
  border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--line);
}

.mfbtn.cancel { background: var(--bg2); color: var(--text2); }
.mfbtn.cancel:hover { color: var(--text); background: var(--bg3); }

.mfbtn.confirm { background: var(--watch); color: white; border-color: var(--watch); }
.mfbtn.confirm:hover { filter: brightness(1.15); }
.mfbtn.confirm:disabled { opacity: 0.4; pointer-events: none; }

/* Status picker in modal */
.status-pick-btn {
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg2);
  color: var(--text2);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-pick-btn:hover { border-color: var(--text2); color: var(--text); }
.status-pick-btn.active[data-s="completed"] { background: var(--done-d);  border-color: var(--done);  color: var(--done); }
.status-pick-btn.active[data-s="watching"]  { background: var(--watch-d); border-color: var(--watch); color: var(--watch); }
.status-pick-btn.active[data-s="planned"]   { background: var(--plan-d);  border-color: var(--plan);  color: var(--plan); }
.status-pick-btn.active[data-s="dropped"]   { background: var(--drop-d);  border-color: var(--drop);  color: var(--drop); }

/* ── ENRICH PROGRESS BAR ── */
.enrich-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg1);
  border-top: 1px solid var(--line);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 500;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.enrich-bar.visible { transform: translateY(0); }
.enrich-bar-label { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
.enrich-bar-sub { font-size: 11px; color: var(--text3); white-space: nowrap; }
.enrich-bar-track {
  flex: 1;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.enrich-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--watch), var(--done));
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}
.enrich-bar-count { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.stats-panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.scard {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.scard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.scard.time-card::before   { background: linear-gradient(90deg, var(--watch), var(--done)); }
.scard.eps-card::before    { background: var(--done); }
.scard.shows-card::before  { background: var(--plan); }
.scard.score-card::before  { background: #f59e0b; }

.scard-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
}

.scard-value {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
}

.scard-value span {
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  margin-left: 3px;
}

.scard-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

/* Responsive */
@media (max-width: 820px) {
  .stats-panel { grid-template-columns: repeat(2, 1fr); }
  .wrap { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
  .sidebar-scroll { position: static; max-height: none; }
  header { padding: 0 16px; gap: 12px; }
  .library { padding: 20px 16px; }
  .hstat-label { display: none; }
  .tabs { overflow-x: auto; }
}

/* ── KEY SCREEN ── */
.key-screen {
  position: fixed;
  inset: 0;
  background: #0c0c0e;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}

.key-screen.hide {
  animation: keyFadeOut 0.4s ease forwards;
}

@keyframes keyFadeOut {
  to { opacity: 0; transform: scale(1.03); pointer-events: none; }
}

.key-box {
  width: 420px;
  max-width: calc(100vw - 40px);
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.key-logo {
  font-family: 'Outfit', sans-serif;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-align: center;
  color: #e8e8f0;
}

.key-logo span { color: #3b82f6; }

.key-tagline {
  text-align: center;
  font-size: 13px;
  color: #44445a;
  margin-top: -18px;
}

.key-card {
  background: #111114;
  border: 1px solid #2a2a35;
  border-radius: 16px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.key-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #44445a;
  margin-bottom: 8px;
}

.key-input-row {
  display: flex;
  gap: 8px;
}

.key-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 11px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.05em;
}

.key-input:focus { border-color: var(--watch); }
.key-input::placeholder { color: var(--text3); letter-spacing: 0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; }

.key-input.error { border-color: var(--drop); animation: shake 0.3s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

.key-btn {
  padding: 11px 18px;
  border-radius: 8px;
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.key-btn.primary { background: var(--watch); color: white; }
.key-btn.primary:hover { filter: brightness(1.15); }
.key-btn.ghost { background: var(--bg2); color: var(--text2); border: 1px solid var(--line); }
.key-btn.ghost:hover { color: var(--text); border-color: var(--text2); }

.key-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text3);
  font-size: 11px;
}
.key-divider::before, .key-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}

.key-new-btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: 1px dashed var(--line);
  background: transparent;
  color: var(--text2);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.key-new-btn:hover { border-color: var(--done); color: var(--done); background: var(--done-d); }

.key-info {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  line-height: 1.6;
}

.key-info strong { color: var(--text2); }

/* Key display (after generation) */
.key-generated {
  background: var(--bg2);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.key-generated-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--done);
}

.key-generated-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text);
  word-break: break-all;
  letter-spacing: 0.06em;
  line-height: 1.5;
}

.key-copy-btn {
  align-self: flex-start;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(34,197,94,0.3);
  background: var(--done-d);
  color: var(--done);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.key-copy-btn:hover { filter: brightness(1.2); }

/* header key badge */
.header-key-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  padding: 5px 12px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.header-key-badge:hover { border-color: var(--text2); }
.header-key-badge-icon { font-size: 13px; }
.header-key-badge-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.04em;
}
.header-key-badge-text strong { color: var(--text2); font-weight: 400; }

</head>
<body>

<!-- KEY SCREEN -->
<div class="key-screen" id="keyScreen">
  <div class="key-box">
    <div class="key-logo">anime<span>.</span>list</div>
    <div class="key-tagline">Twoja osobista lista anime</div>

    <div class="key-card" id="keyCard">
      <div>
        <div class="key-section-title">Masz już klucz? Wpisz go tutaj</div>
        <div class="key-input-row">
          <input class="key-input" id="keyInputField" placeholder="np. A3F2-9KX1-BQ47-ZM8W" maxlength="19" spellcheck="false" autocomplete="off">
          <button class="key-btn primary" onclick="enterKey()">Wejdź</button>
        </div>
        <div id="keyError" style="font-size:11px;color:#ef4444;margin-top:6px;display:none">❌ Nie znaleziono listy dla tego klucza.</div>
      </div>
      <div class="key-divider">lub</div>
      <button class="key-new-btn" onclick="createNewKey()">✨ Utwórz nową listę</button>
    </div>

    <div class="key-info" style="color:#44445a;font-size:11px;text-align:center;line-height:1.6">
      🔐 Klucz to jedyny sposób dostępu do Twojej listy.<br>
      <strong style="color:#8888a0">Zapisz go w bezpiecznym miejscu!</strong>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">anime<span>.</span>list</div>
  <div class="header-divider"></div>
  <div class="hstats">
    <div class="hstat">
      <div class="hstat-dot w"></div>
      <div class="hstat-num" id="hs-w">0</div>
      <div class="hstat-label" style="font-size:12px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500">Oglądam</div>
    </div>
    <div class="hstat">
      <div class="hstat-dot c"></div>
      <div class="hstat-num" id="hs-c">0</div>
      <div class="hstat-label" style="font-size:12px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500">Obejrzane</div>
    </div>
    <div class="hstat">
      <div class="hstat-dot p"></div>
      <div class="hstat-num" id="hs-p">0</div>
      <div class="hstat-label" style="font-size:12px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500">Planuję</div>
    </div>
    <div class="hstat">
      <div class="hstat-dot d"></div>
      <div class="hstat-num" id="hs-d">0</div>
      <div class="hstat-label" style="font-size:12px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500">Porzucone</div>
    </div>
  </div>
  <div class="header-key-badge" onclick="showKeyInfo()" title="Twój klucz dostępu">
    <span class="header-key-badge-icon">🔑</span>
    <span class="header-key-badge-text"><strong id="keyPreview">••••••••</strong></span>
  </div>
</header>

<!-- MAIN -->
<div class="wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-scroll">
      <div class="sec-label">Szukaj anime</div>

      <div class="sbar-wrap">
        <div class="sbar">
          <input class="sinput" id="sInput" type="text"
            placeholder="Wpisz tytuł anime…" autocomplete="off" spellcheck="false">
          <button class="sbtn" id="sBtn">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
        <div class="autocomplete" id="acDrop"></div>
      </div>

      <div class="rlist" id="rList">
        <div class="msg">
          <div class="msg-ico">🔍</div>
          <div class="msg-txt">Wyszukaj anime i kliknij<br>w jeden przycisk żeby dodać</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- LIBRARY -->
  <main class="library">
    <div class="library-header">
      <div class="sec-label" style="margin-bottom:0">Biblioteka</div>
      <div class="csv-btns">
        <button class="csv-btn import" onclick="openImport()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Importuj CSV
        </button>
        <button class="csv-btn export" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Eksportuj CSV
        </button>
      </div>
    </div>

    <!-- STATS PANEL -->
    <div class="stats-panel" id="statsPanel">
      <div class="scard time-card">
        <div class="scard-label">⏱ Czas oglądania</div>
        <div class="scard-value" id="st-time">0<span>h</span></div>
        <div class="scard-sub" id="st-time-sub">z ukończonych tytułów</div>
      </div>
      <div class="scard eps-card">
        <div class="scard-label">📺 Odcinki</div>
        <div class="scard-value" id="st-eps">0<span>odc.</span></div>
        <div class="scard-sub" id="st-eps-sub">łącznie obejrzane</div>
      </div>
      <div class="scard shows-card">
        <div class="scard-label">📋 Tytuły</div>
        <div class="scard-value" id="st-titles">0<span>szt.</span></div>
        <div class="scard-sub" id="st-titles-sub">w całej bibliotece</div>
      </div>
      <div class="scard score-card">
        <div class="scard-label">⭐ Średnia ocena</div>
        <div class="scard-value" id="st-score">—</div>
        <div class="scard-sub" id="st-score-sub">z obejrzanych</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab on" data-f="all" onclick="setF('all',this)">Wszystkie <span class="tcnt" id="fc-all">0</span></button>

<script>
// ════════════════════
//  KEY SYSTEM
// ════════════════════
function generateKey() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seg = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  return `${seg()}-${seg()}-${seg()}-${seg()}`;
}
function getStorageKey(k) { return `al_${k}`; }

let currentKey = null;

function initKeyScreen() {
  const saved = localStorage.getItem('anime_access_key');
  const card  = document.getElementById('keyCard');

  if (saved && localStorage.getItem(getStorageKey(saved)) !== null) {
    card.innerHTML = `
      <div>
        <div class="key-section-title">Witaj z powrotem! 👋</div>
        <div class="key-generated">
          <div class="key-generated-label">Twój klucz</div>
          <div class="key-generated-value">${saved}</div>
        </div>
        <button class="key-btn primary" style="width:100%;margin-top:8px" onclick="enterWithKey('${saved}')">Wejdź na swoją listę →</button>
      </div>
      <div class="key-divider">lub użyj innego klucza</div>
      <div>
        <div class="key-input-row">
          <input class="key-input" id="keyInputField" placeholder="Inny klucz…" maxlength="19" spellcheck="false">
          <button class="key-btn ghost" onclick="enterKey()">Wejdź</button>
        </div>
        <div id="keyError" style="font-size:11px;color:var(--drop);margin-top:6px;display:none">❌ Nie znaleziono listy dla tego klucza.</div>
      </div>
      <button class="key-new-btn" onclick="createNewKey()">✨ Utwórz nową listę</button>`;
  } else {
    card.innerHTML = `
      <div>
        <div class="key-section-title">Masz już klucz? Wpisz go tutaj</div>
        <div class="key-input-row">
          <input class="key-input" id="keyInputField" placeholder="np. A3F2-9KX1-BQ47-ZM8W" maxlength="19" spellcheck="false">
          <button class="key-btn primary" onclick="enterKey()">Wejdź</button>
        </div>
        <div id="keyError" style="font-size:11px;color:var(--drop);margin-top:6px;display:none">❌ Nie znaleziono listy dla tego klucza.</div>
      </div>
      <div class="key-divider">lub</div>
      <button class="key-new-btn" onclick="createNewKey()">✨ Utwórz nową listę</button>`;
  }

  // auto-format XXXX-XXXX-XXXX-XXXX
  const inp = document.getElementById('keyInputField');
  if (inp) {
    inp.addEventListener('input', () => {
      let v = inp.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
      let out = '';
      for (let i=0;i<v.length&&i<16;i++) { if(i>0&&i%4===0) out+='-'; out+=v[i]; }
      inp.value = out;
    });
    inp.addEventListener('keydown', e => { if(e.key==='Enter') enterKey(); });
  }
}

function enterKey() {
  const inp = document.getElementById('keyInputField');
  const val = inp?.value.trim().toUpperCase();
  if (!val || val.length < 19) { flashError(inp); return; }
  if (localStorage.getItem(getStorageKey(val)) === null) {
    document.getElementById('keyError').style.display = 'block';
    flashError(inp); return;
  }
  enterWithKey(val);
}

function flashError(inp) {
  inp?.classList.add('error');
  setTimeout(() => inp?.classList.remove('error'), 400);
}

function createNewKey() {
  const newKey = generateKey();
  localStorage.setItem(getStorageKey(newKey), '[]');
  const card = document.getElementById('keyCard');
  card.innerHTML = `
    <div>
      <div class="key-section-title" style="color:var(--done)">✓ Klucz wygenerowany!</div>
      <div class="key-generated">
        <div class="key-generated-label">Twój unikalny klucz</div>
        <div class="key-generated-value">${newKey}</div>
        <button class="key-copy-btn" onclick="copyKey('${newKey}')">📋 Kopiuj klucz</button>
      </div>
      <div style="font-size:12px;color:var(--plan);line-height:1.6;margin-top:4px">
        ⚠️ <strong>Zapisz ten klucz!</strong> Bez niego stracisz dostęp do listy.
      </div>
      <button class="key-btn primary" style="width:100%;margin-top:8px" onclick="enterWithKey('${newKey}')">Zaczynamy! →</button>
    </div>`;
}

function copyKey(key) {
  navigator.clipboard.writeText(key).then(() => toast('Skopiowano!', key, 'ok'));
}

function enterWithKey(key) {
  localStorage.setItem('anime_access_key', key);
  currentKey = key;
  document.getElementById('keyPreview').textContent = key.slice(0,4) + '-••••';
  db = JSON.parse(localStorage.getItem(getStorageKey(key)) || '[]');
  const ks = document.getElementById('keyScreen');
  ks.classList.add('hide');
  setTimeout(() => { ks.style.display = 'none'; }, 400);
  refreshStats();
  renderGrid();
}

function showKeyInfo() {
  if (!currentKey) return;
  document.getElementById('keyCard').innerHTML = `
    <div>
      <div class="key-section-title">Twój klucz dostępu</div>
      <div class="key-generated">
        <div class="key-generated-label">Klucz</div>
        <div class="key-generated-value">${currentKey}</div>
        <button class="key-copy-btn" onclick="copyKey('${currentKey}')">📋 Kopiuj klucz</button>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px;line-height:1.6">
        Wpisz ten klucz na innym urządzeniu żeby zalogować się do swojej listy.<br>
        <span style="color:var(--drop)">⚠️ Lista zapisana lokalnie — użyj eksportu CSV żeby przenieść na inne urządzenie.</span>
      </div>
      <button class="key-btn ghost" style="width:100%;margin-top:8px" onclick="switchKey()">🔄 Zmień konto</button>
    </div>`;
  const ks = document.getElementById('keyScreen');
  ks.style.display = 'flex';
  ks.classList.remove('hide');
}

function switchKey() {
  currentKey = null;
  localStorage.removeItem('anime_access_key');
  const ks = document.getElementById('keyScreen');
  ks.style.display = 'flex';
  ks.classList.remove('hide');
  initKeyScreen();
}

// ════════════════════
//  STATE
// ════════════════════
let db    = [];
let filt  = 'all';
let dbt;
let cache = {};

const SL  = { watching:'Oglądam', completed:'Obejrzane', planned:'Planuję', dropped:'Porzucone' };
const SIC = { watching:'👁', completed:'✓', planned:'＋', dropped:'✕' };
const SC  = { watching:'var(--watch)', completed:'var(--done)', planned:'var(--plan)', dropped:'var(--drop)' };

function save() {
  if (!currentKey) return;
  localStorage.setItem(getStorageKey(currentKey), JSON.stringify(db));
  refreshStats();
  renderGrid();
}

// ════════════════════
//  JIKAN API
// ════════════════════
async function doSearch(q) {
  q = q.trim();
  if (!q) return;
  const el = document.getElementById('rList');
  el.innerHTML = `<div class="msg"><div class="spin"></div><div class="msg-txt">Szukam…</div></div>`;

  try {
    const r = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=10&sfw=false`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();

    if (!j.data?.length) {
      el.innerHTML = `<div class="msg"><div class="msg-ico">😕</div><div class="msg-txt">Brak wyników dla „${q}"</div></div>`;
      return;
    }
    j.data.forEach(a => { cache[a.mal_id] = a; });
    renderResults(j.data);
  } catch(e) {
    el.innerHTML = `<div class="msg"><div class="msg-ico">⚠️</div><div class="msg-txt">Błąd API<br><span style="font-size:10px;font-family:monospace">${e.message}</span><br><br>Otwórz plik lokalnie.</div></div>`;
  }
}

function renderResults(items) {
  const el = document.getElementById('rList');
  el.innerHTML = '';

  items.forEach(a => {
    const cur = db.find(x => x.id === a.mal_id);
    const d = document.createElement('div');
    d.className = 'rc';
    d.id = `rc-${a.mal_id}`;
    d.innerHTML = `
      <div class="rc-top">
        <img class="rc-img" src="${a.images?.jpg?.image_url||''}" alt="" loading="lazy">
        <div class="rc-info">
          <div class="rc-title">${a.title}</div>
          <div class="rc-tags">
            ${a.score    ? `<span class="rtag sc">★ ${a.score}</span>` : ''}
            ${a.episodes ? `<span class="rtag ep">${a.episodes} odc.</span>` : ''}
            ${a.year     ? `<span class="rtag">${a.year}</span>` : ''}
            ${a.type     ? `<span class="rtag">${a.type}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="rc-actions">
        <button class="qa-btn ${cur?.status==='watching'?'active':''}"
          data-s="watching" onclick="quickAdd(${a.mal_id},'watching')">
          <span class="ico">👁</span>Oglądam
        </button>
        <button class="qa-btn ${cur?.status==='completed'?'active':''}"
          data-s="completed" onclick="quickAdd(${a.mal_id},'completed')">
          <span class="ico">✓</span>Obejrzane
        </button>
        <button class="qa-btn ${cur?.status==='planned'?'active':''}"
          data-s="planned" onclick="quickAdd(${a.mal_id},'planned')">
          <span class="ico">＋</span>Planuję
        </button>
        <button class="qa-btn ${cur?.status==='dropped'?'active':''}"
          data-s="dropped" onclick="quickAdd(${a.mal_id},'dropped')">
          <span class="ico">✕</span>Porzucone
        </button>
      </div>`;
    el.appendChild(d);
  });
}

// ════════════════════
//  QUICK ADD
// ════════════════════
async function quickAdd(malId, status) {
  const ex = db.find(x => x.id === malId);

  if (ex) {
    // just update status
    const old = ex.status;
    if (old === status) { toast(`Już w "${SL[status]}"`, '', 'inf'); return; }
    ex.status = status;
    save();
    refreshResultCard(malId, status);
    toast(`Status zmieniony`, `${ex.title} → ${SL[status]}`, 'ok');
    return;
  }

  // add new
  let a = cache[malId];
  if (!a) {
    try {
      const r = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
      const j = await r.json();
      a = j.data;
      cache[malId] = a;
    } catch(e) {
      toast('Błąd!', e.message, 'err');
      return;
    }
  }

  db.unshift({
    id:           a.mal_id,
    title:        a.title,
    image:        a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '',
    score:        a.score    || null,
    episodes:     a.episodes || null,
    year:         a.year     || null,
    type:         a.type     || '',
    duration_min: parseDuration(a.duration),
    status,
    added: Date.now()
  });

  save();
  refreshResultCard(malId, status);
  toast(`Dodano!`, `${a.title} → ${SL[status]}`, 'ok');
}

function refreshResultCard(malId, activeStatus) {
  const rc = document.getElementById(`rc-${malId}`);
  if (!rc) return;
  rc.querySelectorAll('.qa-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.s === activeStatus);
  });
}

// ════════════════════
//  REMOVE / CHANGE
// ════════════════════
function chStatus(id, ns) {
  const e = db.find(x => x.id === id);
  if (e) { e.status = ns; save(); }
}

function del(id, ev) {
  ev?.stopPropagation();
  const e = db.find(x => x.id === id);
  const title = e?.title || '';
  db = db.filter(x => x.id !== id);
  save();
  toast('Usunięto', title, 'err');
  // refresh card in sidebar if visible
  const rc = document.getElementById(`rc-${id}`);
  if (rc) rc.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'));
}

// ════════════════════
//  RENDER GRID
// ════════════════════
const blank = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='2' height='3'><rect fill='%2318181d' width='2' height='3'/></svg>`;

  if (!items.length) {
    const M = {

        ${a.score ? `<div class="acard-score">★ ${a.score}</div>` : ''}
        <div class="acard-ov">
          <div class="ov-statuses">
            ${['watching','completed','planned','dropped'].map(s=>`

// ════════════════════
//  DURATION PARSER
// ════════════════════
function parseDuration(str) {
  // Jikan returns e.g. "24 min per ep", "1 hr 44 min", "Unknown"
  if (!str || str === 'Unknown') return null;
  let mins = 0;
  const hr  = str.match(/(\d+)\s*hr/);
  const min = str.match(/(\d+)\s*min/);
  if (hr)  mins += parseInt(hr[1])  * 60;
  if (min) mins += parseInt(min[1]);
  return mins > 0 ? mins : null;
}

function formatTime(totalMin) {
  if (totalMin < 60) return { val: totalMin, unit: 'min', sub: '' };
  const h = Math.round(totalMin / 60);
  if (h < 24) return { val: h, unit: 'h', sub: `${totalMin} minut` };
  const d = Math.floor(h / 24);
  const rem = h % 24;
  return { val: d, unit: 'd', sub: `${h} godzin (${rem}h reszty)` };
}

// ════════════════════
//  STATS + FILTER
// ════════════════════
function refreshStats() {
  const c = {watching:0,completed:0,planned:0,dropped:0};
  db.forEach(a => c[a.status]++);
  document.getElementById('hs-w').textContent  = c.watching;
  document.getElementById('hs-c').textContent  = c.completed;
  document.getElementById('hs-p').textContent  = c.planned;
  document.getElementById('hs-d').textContent  = c.dropped;
  document.getElementById('fc-all').textContent = db.length;
  document.getElementById('fc-w').textContent  = c.watching;
  document.getElementById('fc-c').textContent  = c.completed;
  document.getElementById('fc-p').textContent  = c.planned;
  document.getElementById('fc-d').textContent  = c.dropped;

  // ── Time stats (completed + watching)
  let totalMins = 0, totalEps = 0;
  db.filter(a => a.status === 'completed' || a.status === 'watching').forEach(a => {
    const eps = a.episodes || 0;
    const dur = a.duration_min || 24; // default 24 min if unknown
    totalEps  += eps;
    totalMins += eps * dur;
  });

  // Total time
  const tf = formatTime(totalMins);
  document.getElementById('st-time').innerHTML = `${tf.val}<span>${tf.unit}</span>`;
  document.getElementById('st-time-sub').textContent = tf.sub || 'z oglądanych i ukończonych';

  // Episodes
  document.getElementById('st-eps').innerHTML = `${totalEps.toLocaleString('pl')}<span>odc.</span>`;
  document.getElementById('st-eps-sub').textContent = `≈ ${Math.round(totalMins / 60)} godzin`;

  // Titles
  document.getElementById('st-titles').innerHTML = `${db.length}<span>szt.</span>`;
  const completedCount = c.completed;
  document.getElementById('st-titles-sub').textContent = `${completedCount} ukończone, ${c.watching} w trakcie`;

  // Avg score (completed only)
  const scored = db.filter(a => a.status === 'completed' && a.score);
  if (scored.length) {
    const avg = (scored.reduce((s, a) => s + a.score, 0) / scored.length).toFixed(1);
    document.getElementById('st-score').innerHTML = `${avg}<span>/ 10</span>`;
    document.getElementById('st-score-sub').textContent = `z ${scored.length} ocenionych tytułów`;
  } else {
    document.getElementById('st-score').innerHTML = `—`;
    document.getElementById('st-score-sub').textContent = 'brak danych';
  }
}

function setF(f, btn) {
  filt = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');

  const grid = document.getElementById('aGrid');
  const sched = document.getElementById('scheduleView');

  if (f === 'schedule') {
    grid.style.display  = 'none';
    sched.style.display = 'block';
    loadSchedule();
  } else {
    grid.style.display  = '';
    sched.style.display = 'none';
    renderGrid();
  }
}

// ════════════════════
//  SCHEDULE
// ════════════════════
const DAYS_PL = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
const DAYS_EN = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const SEASONS = { 1:'Zima', 2:'Zima', 3:'Wiosna', 4:'Wiosna', 5:'Wiosna', 6:'Lato', 7:'Lato', 8:'Lato', 9:'Jesień', 10:'Jesień', 11:'Jesień', 12:'Zima' };

let scheduleCache = null;

async function loadSchedule() {
  const el = document.getElementById('scheduleView');
  if (scheduleCache) { renderSchedule(scheduleCache); return; }

  el.innerHTML = `<div class="sched-loading"><div class="spin"></div><br>Pobieranie harmonogramu…</div>`;

  try {
    // fetch all 7 days in parallel
    const days = await Promise.all(
      DAYS_EN.map(day =>
        fetch(`https://api.jikan.moe/v4/schedules?filter=${day}&limit=25`)
          .then(r => r.json())
          .then(j => ({ day, items: j.data || [] }))
          .catch(() => ({ day, items: [] }))
      )
    );
    scheduleCache = days;
    renderSchedule(days);
  } catch(e) {
    el.innerHTML = `<div class="sched-loading">⚠️ Błąd pobierania harmonogramu<br><small>${e.message}</small></div>`;
  }
}

function renderSchedule(days) {
  const el       = document.getElementById('scheduleView');
  const todayIdx = new Date().getDay(); // 0=Sun
  const now      = new Date();
  const season   = SEASONS[now.getMonth() + 1];
  const year     = now.getFullYear();
  const dbTitles = new Set(db.map(x => x.title.toLowerCase()));
  const dbIds    = new Set(db.map(x => x.id));

  // reorder so today is first
  const ordered = [
    ...days.slice(todayIdx),
    ...days.slice(0, todayIdx)
  ];

  let html = `
    <div class="sched-season-badge">
      📅 Aktualny sezon: <span>${season} ${year}</span>
      &nbsp;·&nbsp; dane z MyAnimeList
    </div>
    <div class="schedule-wrap">`;

  ordered.forEach(({ day, items }) => {
    const dayIdx  = DAYS_EN.indexOf(day);
    const isToday = dayIdx === todayIdx;
    const dayName = DAYS_PL[dayIdx];

    // sort by score desc
    const sorted = [...items].sort((a,b) => (b.score||0) - (a.score||0));

    html += `
      <div class="sched-day">
        <div class="sched-day-header">
          <div class="sched-day-name ${isToday ? 'today' : ''}">${dayName}</div>
          ${isToday ? '<div class="sched-today-badge">Dziś</div>' : ''}
          <div class="sched-day-line"></div>
        </div>
        <div class="sched-row">`;

    if (!sorted.length) {
      html += `<div style="color:var(--text3);font-size:13px;padding:8px 0">Brak danych</div>`;
    }

    sorted.forEach(a => {
      const inDb    = dbIds.has(a.mal_id) || dbTitles.has(a.title.toLowerCase());
      const img     = a.images?.jpg?.image_url || '';
      const score   = a.score ? `<span class="sched-tag score">★ ${a.score}</span>` : '';
      const eps     = a.episodes ? `<span class="sched-tag eps">${a.episodes} odc.</span>` : '<span class="sched-tag eps">? odc.</span>';
      const airTime = a.broadcast?.time ? `<span class="sched-tag time">🕐 ${a.broadcast.time} JST</span>` : '';

      const addBtns = inDb
        ? `<span class="sched-add-btn on-list-btn">✓ Na liście</span>`
        : `<button class="sched-add-btn watching" onclick="schedAdd(${a.mal_id},'watching')">👁 Oglądam</button>
           <button class="sched-add-btn planned"  onclick="schedAdd(${a.mal_id},'planned')">＋ Planuję</button>`;

      html += `
        <div class="sched-card ${inDb ? 'on-list' : ''}" id="sc-${a.mal_id}">
          <img class="sched-thumb" src="${img}" alt="${a.title}" loading="lazy">
          <div class="sched-info">
            <div class="sched-title">${a.title}</div>
            <div class="sched-meta">${score}${eps}${airTime}</div>
            <div class="sched-actions">${addBtns}</div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

async function schedAdd(malId, status) {
  // check cache first
  let a = null;
  scheduleCache?.forEach(({ items }) => {
    const found = items.find(x => x.mal_id === malId);
    if (found) a = found;
  });

  if (!a) {
    try {
      const r = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
      const j = await r.json();
      a = j.data;
    } catch(e) { toast('Błąd!', e.message, 'err'); return; }
  }

  const ex = db.find(x => x.id === malId);
  if (ex) { ex.status = status; }
  else {
    db.unshift({
      id:           a.mal_id,
      title:        a.title,
      image:        a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '',
      score:        a.score || null,
      episodes:     a.episodes || null,
      year:         a.year || null,
      type:         a.type || '',
      duration_min: parseDuration(a.duration),
      status,
      added: Date.now()
    });
  }

  save();
  toast('Dodano!', `${a.title} → ${SL[status]}`, 'ok');

  // update card in schedule view
  const card = document.getElementById(`sc-${malId}`);
  if (card) {
    card.classList.add('on-list');
    card.querySelector('.sched-actions').innerHTML =
      `<span class="sched-add-btn on-list-btn">✓ Na liście</span>`;
  }
}

//  TOAST
// ════════════════════
let tT;
function toast(title, sub, type='ok') {
  const el   = document.getElementById('toast');
  const bar  = document.getElementById('tbar');
  document.getElementById('tt').textContent = title;
  document.getElementById('ts').textContent = sub || '';
  bar.className = `toast-bar ${type}`;
  el.classList.add('vis');
  clearTimeout(tT);
  tT = setTimeout(() => el.classList.remove('vis'), 2800);
}

// ════════════════════
//  AUTOCOMPLETE
// ════════════════════
let acData    = [];
let acFocus   = -1;
let acDebounce;
let acActive  = false;

const acDrop = document.getElementById('acDrop');

async function fetchSuggestions(q) {
  if (q.trim().length < 2) { closeAc(); return; }
  try {
    const r = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=8&sfw=false`);
    if (!r.ok) return;
    const j = await r.json();
    if (!j.data?.length) { closeAc(); return; }
    acData = j.data;
    j.data.forEach(a => { cache[a.mal_id] = a; });
    renderAc(q, j.data);
  } catch { closeAc(); }
}

function highlight(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) +
    `<mark>${text.slice(idx, idx + query.length)}</mark>` +
    text.slice(idx + query.length);
}

function renderAc(q, items) {
  acDrop.innerHTML = '';
  acFocus = -1;
  items.forEach((a, i) => {
    const inDb = db.find(x => x.id === a.mal_id);
    const row  = document.createElement('div');
    row.className = 'ac-item';
    row.dataset.idx = i;
    row.innerHTML = `
      <img class="ac-thumb" src="${a.images?.jpg?.image_url||''}" alt="" loading="lazy">
      <div class="ac-info">
        <div class="ac-title">${highlight(a.title, q)}</div>
        <div class="ac-meta">
          ${a.score    ? `<span class="ac-tag score">★ ${a.score}</span>` : ''}
          ${a.episodes ? `<span class="ac-tag">${a.episodes} odc.</span>` : ''}
          ${a.year     ? `<span class="ac-tag">${a.year}</span>` : ''}
          ${inDb       ? `<span class="ac-tag" style="color:var(--done)">✓ na liście</span>` : ''}
        </div>
      </div>
      <span class="ac-arrow">↵</span>`;
    row.addEventListener('mousedown', e => {
      e.preventDefault();
      selectAc(i);
    });
    acDrop.appendChild(row);
  });
  acDrop.classList.add('open');
  acActive = true;
}

function selectAc(i) {
  const a = acData[i];
  if (!a) return;
  inp.value = a.title;
  closeAc();
  doSearch(a.title);
}

function closeAc() {
  acDrop.classList.remove('open');
  acDrop.innerHTML = '';
  acActive = false;
  acFocus  = -1;
}

function moveFocus(dir) {
  const items = acDrop.querySelectorAll('.ac-item');
  if (!items.length) return;
  items.forEach(i => i.classList.remove('focused'));
  acFocus = (acFocus + dir + items.length) % items.length;
  items[acFocus].classList.add('focused');
}

// ════════════════════
//  EVENTS
// ════════════════════
const inp = document.getElementById('sInput');

inp.addEventListener('input', () => {
  clearTimeout(dbt);
  clearTimeout(acDebounce);
  const v = inp.value.trim();
  if (!v) { closeAc(); return; }
  acDebounce = setTimeout(() => fetchSuggestions(v), 280);
  if (v.length >= 3)
    dbt = setTimeout(() => doSearch(v), 900);
});

inp.addEventListener('keydown', e => {
  if (acActive) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(1); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); moveFocus(-1); return; }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (acFocus >= 0) { selectAc(acFocus); return; }
      closeAc(); doSearch(inp.value); return;
    }
    if (e.key === 'Escape') { closeAc(); return; }
  }
  if (e.key === 'Enter') { clearTimeout(dbt); clearTimeout(acDebounce); doSearch(inp.value); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.sbar-wrap')) closeAc();
});

inp.addEventListener('focus', () => {
  if (inp.value.trim().length >= 2 && acData.length)
    renderAc(inp.value, acData);
});

document.getElementById('sBtn').addEventListener('click', () => {
  closeAc();
  doSearch(inp.value);
});

let defaultImportStatus = 'completed';

function pickStatus(btn) {
  document.querySelectorAll('.status-pick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  defaultImportStatus = btn.dataset.s;
  // re-parse if file already loaded
  if (parsedImport.length) showPreview(parsedImport);
}

// ════════════════════
//  CSV EXPORT
// ════════════════════
function exportCSV() {
  if (!db.length) { toast('Brak danych', 'Dodaj najpierw jakieś anime!', 'err'); return; }

  const headers = ['id','title','status','score','episodes','year','type','duration_min','image','added'];
  const rows = db.map(a => headers.map(h => {
    const v = a[h] ?? '';
    // escape commas/quotes in strings
    if (typeof v === 'string' && (v.includes(',') || v.includes('"') || v.includes('\n')))
      return `"${v.replace(/"/g, '""')}"`;
    return v;
  }).join(','));

  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `anime-list-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Wyeksportowano!', `${db.length} tytułów → CSV`, 'ok');
}

//  CSV IMPORT
// ════════════════════
let parsedImport = [];

function openImport() {
  parsedImport = [];
  defaultImportStatus = 'completed';
  document.getElementById('modalTitle').textContent = 'Importuj CSV';
  document.getElementById('modalFoot').style.display = 'none';

function closeModal() {
  document.getElementById('csvModal').classList.remove('open');
}

function buildDropzoneHTML() {

    <div class="dropzone" id="dropzone" onclick="document.getElementById('csvFile').click()">
      <div class="dropzone-icon">📂</div>
      <div class="dropzone-title">Przeciągnij plik CSV tutaj</div>
      <div class="dropzone-sub">lub <span onclick="event.stopPropagation();document.getElementById('csvFile').click()">wybierz z dysku</span></div>
      <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none" onchange="handleFile(this.files[0])">
    </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="statusPicker">
        <button class="status-pick-btn active" data-s="completed" onclick="pickStatus(this)">
          <span>✓</span> Obejrzane
        </button>

function bindDropzone() {
  const dz = document.getElementById('dropzone');
  if (!dz) return;
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('drag'));
  dz.addEventListener('drop',      e => {
    e.preventDefault();
    dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
}

function handleFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.csv') && file.type !== 'text/csv') {
    toast('Zły format', 'Wybierz plik .csv', 'err');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

const STATUS_ALIASES = {
  watching:  ['watching','oglądam','oglad','in progress','watching'],
  completed: ['completed','obejrzane','ukonczone','finished','done','complete'],
  planned:   ['planned','planuję','planuje','plan to watch','ptw','want to watch'],
  dropped:   ['dropped','porzucone','dropped','abandoned'],
};

function normalizeStatus(raw) {
  if (!raw) return null;
  const s = raw.trim().toLowerCase();
  for (const [key, aliases] of Object.entries(STATUS_ALIASES))
    if (aliases.includes(s)) return key;
  return null;
}

function parseCSV(text) {
  // strip BOM
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) { toast('Pusty plik', 'CSV nie zawiera danych.', 'err'); return; }

  // parse header
  const headers = splitCSVLine(lines[0]).map(h => h.toLowerCase().trim().replace(/^"|"$/g,''));

  const titleIdx  = headers.indexOf('title');
  const statusIdx = headers.indexOf('status');
  const idIdx     = headers.indexOf('id');
  const scoreIdx  = headers.indexOf('score');
  const epsIdx    = headers.indexOf('episodes');
  const yearIdx   = headers.indexOf('year');
  const typeIdx   = headers.indexOf('type');
  const durIdx    = headers.indexOf('duration_min');
  const imgIdx    = headers.indexOf('image');

  if (titleIdx === -1) {
    toast('Brak kolumny "title"', 'CSV musi mieć kolumnę z tytułem.', 'err');
    return;
  }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols  = splitCSVLine(lines[i]);
    const title = cols[titleIdx]?.trim().replace(/^"|"$/g,'');
    if (!title) continue;

    const rawStatus = statusIdx >= 0 ? cols[statusIdx] : '';
    const status    = normalizeStatus(rawStatus) || defaultImportStatus;
    const isUnknown = !normalizeStatus(rawStatus);

    rows.push({
      _line:       i + 1,
      _statusWarn: isUnknown,
      id:          idIdx >= 0   ? parseInt(cols[idIdx]) || null : null,
      title,
      status,
      score:       scoreIdx >= 0 ? parseFloat(cols[scoreIdx]) || null : null,
      episodes:    epsIdx >= 0   ? parseInt(cols[epsIdx])    || null : null,
      year:        yearIdx >= 0  ? parseInt(cols[yearIdx])   || null : null,
      type:        typeIdx >= 0  ? cols[typeIdx]?.trim().replace(/^"|"$/g,'') || '' : '',
      duration_min: durIdx >= 0  ? parseInt(cols[durIdx])   || null : null,
      image:       imgIdx >= 0   ? cols[imgIdx]?.trim().replace(/^"|"$/g,'') || '' : '',
      added:       Date.now(),
    });
  }

  if (!rows.length) { toast('Brak wierszy', 'Plik CSV jest pusty.', 'err'); return; }
  parsedImport = rows;
  showPreview(rows);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

function showPreview(rows) {
  const existingIds = new Set(db.map(x => x.id).filter(Boolean));
  const existingTitles = new Set(db.map(x => x.title.toLowerCase()));

  let newCount = 0, skipCount = 0, warnCount = 0;
  const tableRows = rows.map(r => {
    const skip = (r.id && existingIds.has(r.id)) || existingTitles.has(r.title.toLowerCase());
    if (skip) skipCount++;
    else newCount++;
    if (r._statusWarn) warnCount++;
    return { ...r, _skip: skip };
  });

  const warn = warnCount ? `⚠ ${warnCount} nieznany status → "Planuję"` : '';

  document.getElementById('modalBody').innerHTML = `
    <div class="preview-info">
      <div class="preview-count">${rows.length} wierszy wczytano</div>
      ${warn ? `<div class="preview-warn">${warn}</div>` : ''}
    </div>
    <table class="preview-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Tytuł</th>
          <th>Status</th>
          <th>Odc.</th>
          <th>Rok</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${tableRows.slice(0,50).map((r,i) => `
          <tr style="${r._skip ? 'opacity:0.4' : ''}">
            <td style="color:var(--text3);font-size:11px">${i+1}</td>
            <td class="pt-title">${r.title}</td>
            <td><span class="preview-badge ${r.status}">${SL[r.status]}</span></td>
            <td style="color:var(--text3)">${r.episodes||'—'}</td>
            <td style="color:var(--text3)">${r.year||'—'}</td>
            <td>${r._skip ? '<span class="preview-skip">duplikat</span>' : ''}</td>
          </tr>`).join('')}
        ${rows.length > 50 ? `<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:10px">... i ${rows.length - 50} więcej</td></tr>` : ''}
      </tbody>
    </table>`;

  const foot = document.getElementById('modalFoot');
  foot.style.display = 'flex';
  document.getElementById('modalInfo').textContent = `${newCount} nowych, ${skipCount} pominiętych (duplikaty)`;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = newCount === 0;
  btn.textContent = newCount > 0 ? `Dodaj ${newCount} anime` : 'Brak nowych';
}

function confirmImport() {
  const existingIds    = new Set(db.map(x => x.id).filter(Boolean));
  const existingTitles = new Set(db.map(x => x.title.toLowerCase()));
  const toEnrich = [];

  parsedImport.forEach(r => {
    const skip = (r.id && existingIds.has(r.id)) || existingTitles.has(r.title.toLowerCase());
    if (skip) return;
    const entry = {
      id:           r.id || ('csv_' + Date.now() + '_' + Math.random()),
      title:        r.title,
      image:        r.image || '',
      score:        r.score,
      episodes:     r.episodes,
      year:         r.year,
      type:         r.type,
      duration_min: r.duration_min,
      status:       r.status,
      added:        r.added,
      _needsEnrich: !r.image,
    };
    db.push(entry);
    if (!r.image) toEnrich.push(entry);
  });

  save();
  closeModal();
  toast(`Zaimportowano ${toEnrich.length > 0 ? '— pobieram okładki…' : '!'}`, `Dodano ${toEnrich.length + (parsedImport.length - toEnrich.length)} tytułów`, 'ok');

  if (toEnrich.length > 0) enrichMissing(toEnrich);
}

// ════════════════════
//  ENRICH — pobiera okładki z Jikan (sequential + retry)
// ════════════════════
async function enrichMissing(entries) {
  const total = entries.length;
  let done = 0, failed = 0;

  const bar     = document.getElementById('enrichBar');
  const fill    = document.getElementById('enrichFill');
  const countEl = document.getElementById('enrichCount');
  const subEl   = document.getElementById('enrichSub');

  bar.classList.add('visible');

  function updateBar() {
    const pct = Math.round(((done + failed) / total) * 100);
    fill.style.width = pct + '%';
    countEl.textContent = `${done + failed} / ${total}`;
    subEl.textContent   = `✓ ${done} znalezionych, ✗ ${failed} nieznanych`;
  }

  updateBar();

  for (const entry of entries) {
    let attempts = 0;
    let success  = false;

    while (attempts < 3 && !success) {
      try {
        const r = await fetch(
          `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(entry.title)}&limit=1&sfw=false`
        );

        if (r.status === 429) {
          // rate limited — wait 2s and retry
          subEl.textContent = '⏳ Rate limit — czekam chwilę…';
          await new Promise(res => setTimeout(res, 2200));
          attempts++;
          continue;
        }

        if (!r.ok) { attempts++; continue; }

        const j = await r.json();
        const a = j.data?.[0];

        if (a) {
          // entry is a direct reference to db object
          entry.image        = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
          entry.score        = entry.score    || a.score       || null;
          entry.episodes     = entry.episodes || a.episodes    || null;
          entry.year         = entry.year     || a.year        || null;
          entry.duration_min = entry.duration_min || parseDuration(a.duration);
          if (String(entry.id).startsWith('csv_')) entry.id = a.mal_id;
          delete entry._needsEnrich;

          // update card image in DOM directly (no full re-render)
          const img = document.querySelector(`.acard-img[alt="${CSS.escape(entry.title)}"]`);
          if (img && entry.image) img.src = entry.image;

          done++;
          success = true;
        } else {
          failed++;
          success = true; // no retry — title just not found
        }

      } catch(e) {
        attempts++;
        if (attempts < 3) await new Promise(res => setTimeout(res, 1000));
      }
    }

    if (!success) failed++;

    // persist every 5 entries
    if ((done + failed) % 5 === 0) {
      if (currentKey) localStorage.setItem(getStorageKey(currentKey), JSON.stringify(db));
      refreshStats();
    }

    updateBar();

    // 400ms between requests to respect Jikan rate limit
    await new Promise(res => setTimeout(res, 420));
  }

  // final save & full re-render
  save();
  bar.classList.remove('visible');
  toast(`Okładki pobrane! 🎉`, `${done} z ${total} zaktualizowanych`, 'ok');
}
